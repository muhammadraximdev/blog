<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Blog{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333; }
        nav { background: #2c3e50; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: #fff; text-decoration: none; margin-left: 16px; font-size: 14px; }
        nav a:hover { color: #3498db; }
        .brand { font-size: 18px; font-weight: bold; color: #3498db !important; margin-left: 0 !important; }
        .container { max-width: 880px; margin: 30px auto; padding: 0 20px; }
        .card { background: #fff; border-radius: 6px; padding: 22px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        h1 { margin-bottom: 20px; font-size: 24px; }
        h2 { font-size: 20px; margin-bottom: 10px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input[type=text], input[type=email], input[type=password], textarea {
            width: 100%; padding: 9px 12px; border: 1px solid #ccc; border-radius: 4px;
            font-size: 14px; margin-bottom: 14px;
        }
        textarea { min-height: 120px; resize: vertical; }
        .btn { display: inline-block; padding: 9px 20px; border: none; border-radius: 4px;
               cursor: pointer; font-size: 14px; text-decoration: none; }
        .btn-primary  { background: #3498db; color: #fff; }
        .btn-primary:hover  { background: #2980b9; }
        .btn-warning  { background: #f39c12; color: #fff; }
        .btn-warning:hover  { background: #d68910; }
        .btn-danger   { background: #e74c3c; color: #fff; }
        .btn-danger:hover   { background: #c0392b; }
        .btn-secondary{ background: #95a5a6; color: #fff; }
        .btn-secondary:hover{ background: #7f8c8d; }
        .tag { display: inline-block; background: #eaf4fb; color: #2980b9;
               padding: 3px 10px; border-radius: 12px; font-size: 12px; margin-right: 5px; }
        .meta { color: #888; font-size: 13px; margin-bottom: 10px; }
        .errorlist { list-style: none; color: #e74c3c; font-size: 13px; margin-bottom: 10px; }
        .error { color: #e74c3c; font-size: 13px; margin-bottom: 10px; }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
        .checkbox-group label { font-weight: normal; display: flex; align-items: center; gap: 5px; }
        .actions { display: flex; gap: 10px; margin-top: 12px; }
    </style>
</head>
<body>
<nav>
    <a href="/articles/" class="brand">📝 Blog</a>
    <div>
        {% if user.is_authenticated %}
            <a href="/articles/">Barcha maqolalar</a>
            <a href="/my-articles/">Mening maqolalarim</a>
            <a href="/logout/">Chiqish ({{ user.username }})</a>
        {% else %}
            <a href="/articles/">Maqolalar</a>
            <a href="/login/">Kirish</a>
            <a href="/register/">Ro'yxatdan o'tish</a>
        {% endif %}
    </div>
</nav>
<div class="container">
    {% block content %}{% endblock %}
</div>
</body>
</html>
